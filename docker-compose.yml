services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: support2thrive
      POSTGRES_USER: support2thrive
      POSTGRES_PASSWORD: support2thrive_dev_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data:
